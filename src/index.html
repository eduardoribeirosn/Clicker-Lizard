<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Lizard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer type="module"></script>
</head>
<body>
    <div id="idTelaGame">
        <section id="idHeader">
            <span id="idTitleGame">Clicker Lizens</span>
        </section>
        <section id="idMain">
            <div id="idTop">
                <div class="containerTop">
                    <div id="idBasicInformation">
                        <div class="containerBasicInformation">
                            <div id="idZengiaAtual">
                                ⚡<span id="idZengiaAtualValor">0</span>⚡
                            </div>
                            <div id="idZPS">
                                + <span id="idZPSValor">0</span> ZPS
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="idMid">
                <div class="containerMid">
                    <div id="idMidLeft">
                        <div class="containerMidLeft">
                            <!-- Menu Botões -->
                            <div id="idMenuBarLeft" style="display: none;">
                                <div class="containerMenuBarLeft">
                                    <div class="opcoesMenuBarLeft" id="idUpgradeEnergies"></div>
                                    <div class="opcoesMenuBarLeft" id="idUnlockingTypesEnergy"></div>
                                    <div class="opcoesMenuBarLeft"></div>
                                    <div class="opcoesMenuBarLeft"></div>
                                    <div class="opcoesMenuBarLeft"></div>
                                </div>
                            </div>
                            <!-- Menu Energias -->
                            <div id="idMenuLeftEnergias">
                                <div class="containerMenuLeftEnergias">
                                    <div id="idConteudoEnergias">
                                        <div class="containerConteudoEnergias">
                                            <div id="idConteudoEnergiasFiltros">
                                                <div class="containerConteudoEnergiasFiltros">
                                                    <div id="idEnergiasFiltrosButtonLeft">
                                                        <div class="containerEnergiasFiltrosButtonLeft">
                                                            <img src="./assets/Chevrons left.png" alt="Button to change the filter to the Left">
                                                            <img src="./assets/Chevrons left.png" alt="Button to change the filter to the Left">
                                                        </div>
                                                    </div>
                                                    <div id="idContainerEnergiasFiltros">
                                                        <div class="opcaoEnergiasFiltro opcaoEnergiasFiltroSelecionado" id="idEnergiaFiltro_Zengia"></div>
                                                        <div class="opcaoEnergiasFiltro" id="idEnergiaFiltro_ElementFire"></div>
                                                        <div class="opcaoEnergiasFiltro"></div>
                                                        <div class="opcaoEnergiasFiltro"></div>
                                                        <div class="opcaoEnergiasFiltro"></div>
                                                    </div>
                                                    <div id="idEnergiasFiltrosButtonRight">
                                                        <div class="containerEnergiasFiltrosButtonRight">
                                                            <img src="./assets/Chevrons right.png" alt="Button to change the filter to the Right">
                                                            <img src="./assets/Chevrons right.png" alt="Button to change the filter to the Right">
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div id="idConteudoEnergiasTitle">
                                                <div class="containerConteudoEnergiasTitle">
                                                    <span id="idConteudoEnergiasTitleText">Upgrades - Zengia</span>
                                                </div>
                                            </div>
                                            <!-- <div id="idConteudoEnergiasSubTitle">
                                                <div class="containerConteudoEnergiasSubTitle">
                                                    <div class="conteudoEnergiasSubTitles">
                                                        <span class="subTitleConteudoEnergias subTitleLevel">Level</span>
                                                        <span class="subTitleConteudoEnergias subTitleName">Descrição</span>
                                                        <span class="subTitleConteudoEnergias subTitleCost">Custo</span>
                                                        <span class="subTitleConteudoEnergias subTitleQtd">Upar</span>
                                                    </div>
                                                </div>
                                            </div> -->
                                            <div id="idConteudoEnergiasUpgrades">
                                                <div class="containerConteudoEnergiasUpgrades">
                                                    <div class="opcaoEnergiasUpgrade">
                                                        <span class="levelUpgradeEnergias"><span id="idLvlUpGanhoPorClique">1</span></span>
                                                        <span class="nameUpgradeEnergias">Ganho por Clique</span>
                                                        <div class="costUpgradeEnergias"><span id="idCostGanhoPorClique">5</span></div>
                                                        <div class="qtdUpgradeEnergias">+<span id="idQtdGanhoPorClique">1</span></div>
                                                    </div>
                                                    <div class="opcaoEnergiasUpgrade">
                                                        <span class="levelUpgradeEnergias"><span id="idLvlUpGanhoPorClique">1</span></span>
                                                        <span class="nameUpgradeEnergias">Maquina</span>
                                                        <div class="costUpgradeEnergias"><span id="idCostGanhoPorClique">500</span></div>
                                                        <div class="qtdUpgradeEnergias">+<span id="idQtdGanhoPorClique">1</span></div>
                                                    </div>
                                                    <div class="opcaoEnergiasUpgrade"></div>
                                                    <div class="opcaoEnergiasUpgrade"></div>
                                                    <div class="opcaoEnergiasUpgrade"></div>
                                                    <div class="opcaoEnergiasUpgrade"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div id="idFecharEnergias">
                                        <div class="containerFecharEnergias">
                                            <div class="iconsFechar" id="idCloseMenuLeft">
                                                <img src="./assets/Chevrons left.png" alt="Icon to close the menu">
                                                <img src="./assets/Chevrons left.png" alt="Icon to close the menu">
                                                <img src="./assets/Chevrons left.png" alt="Icon to close the menu">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="idMidMid">
                        <div class="containerMidMid">
                            <div id="idMainButton">
                                <div class="containerMainButton">
                                    🔷
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="idMidRight">
                        
                    </div>
                </div>
            </div>
            <div id="idBot">

            </div>
        </section>
    </div>
</body>
</html>
